<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — Civic Issue Reporter</title>
    <meta name="description" content="Admin panel to manage and resolve reported civic issues">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            color: #1e293b;
            min-height: 100vh;
        }

        /* ─── Header ─── */
        .header {
            background: #ffffff;
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header h1 {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ef4444, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .header-links a {
            color: #64748b;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
        }

        .header-links a:hover {
            color: #0f172a;
            background: #f8fafc;
            border-color: #cbd5e1;
        }

        /* ─── Container ─── */
        .container {
            max-width: 1000px;
            margin: 24px auto;
            padding: 0 16px;
        }

        .stats-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            flex: 1;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px 20px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .stat-card .value {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .stat-card .label {
            font-size: 0.75rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-open .value {
            color: #ef4444;
        }

        .stat-total .value {
            color: #6366f1;
        }

        #adminMap {
            background: #ffffff;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        /* ─── Table ─── */
        .table-wrapper {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            background: #f8fafc;
            padding: 14px 16px;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #475569;
            border-bottom: 1px solid #e2e8f0;
        }

        tbody td {
            padding: 14px 16px;
            font-size: 0.85rem;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
            color: #334155;
        }

        tbody tr:hover {
            background: #f8fafc;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .issue-thumb {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
        }

        .status-badge {
            font-size: 0.65rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-open {
            background: #fee2e2;
            color: #ef4444;
        }

        .status-resolved {
            background: #dcfce7;
            color: #22c55e;
        }

        .resolve-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            color: #fff;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: opacity 0.2s, transform 0.2s;
            white-space: nowrap;
        }

        .resolve-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .resolve-btn:active {
            transform: translateY(1px);
        }

        .resolve-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #94a3b8;
        }

        /* ─── Hidden file input ─── */
        .hidden-file {
            display: none;
        }

        /* ─── Empty / Loading ─── */
        .loading-msg,
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #64748b;
            font-size: 0.9rem;
        }

        .empty-state .icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        /* ─── Toast ─── */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #22c55e;
            color: #fff;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            opacity: 0;
            transition: all 0.3s;
            z-index: 3000;
            pointer-events: none;
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.error {
            background: #ef4444;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        @media (max-width: 768px) {
            .stats-bar {
                flex-direction: column;
            }

            table {
                font-size: 0.8rem;
            }

            thead th,
            tbody td {
                padding: 10px 12px;
            }

            .issue-thumb {
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>🛡️ Admin Dashboard</h1>
        <div class="header-links">
            <span id="adminName" style="color:#fca5a5;font-size:0.85rem;font-weight:600;margin-right:8px;"></span>
            <a href="../index.html">← Public View</a>
            <a href="#" id="logoutBtn"
                style="margin-left:8px;color:#f87171;border-color:rgba(239,68,68,0.25);">Logout</a>
        </div>
    </div>

    <div class="container">
        <div class="stats-bar">
            <div class="stat-card stat-open">
                <div class="value" id="openCount">—</div>
                <div class="label">Open Issues</div>
            </div>
            <div class="stat-card stat-total">
                <div class="value" id="totalCount">—</div>
                <div class="label">Total Issues</div>
            </div>
        </div>

        <div id="adminMap"
            style="width: 100%; height: 350px; margin-bottom: 24px; border-radius: 12px; border: 1px solid rgba(99, 102, 241, 0.2); z-index: 10;">
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Photo</th>
                        <th>Reporter Info</th>
                        <th>Title & Description</th>
                        <th>Impact / Loss</th>
                        <th>Upvotes & Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="issueTableBody">
                    <tr>
                        <td colspan="6" class="loading-msg">Loading issues...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="../scripts/admin.js"></script>

</body>

</html>
