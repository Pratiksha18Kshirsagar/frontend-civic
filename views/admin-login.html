<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Civic Issue Reporter</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: linear-gradient(145deg, #1e1e36, #1a1a2e);
            border: 1px solid rgba(239, 68, 68, 0.15);
            border-radius: 18px;
            padding: 36px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo .icon {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }

        .logo h2 {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ef4444, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo p {
            color: #64748b;
            font-size: 0.85rem;
            margin-top: 4px;
        }

        label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            background: rgba(15, 15, 26, 0.6);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 10px;
            padding: 12px 14px;
            color: #e2e8f0;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            margin-bottom: 18px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #ef4444;
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #ef4444, #f97316);
            border: none;
            color: #fff;
            padding: 13px;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: opacity 0.2s, transform 0.2s;
            margin-bottom: 16px;
        }

        button:hover {
            opacity: 0.9;
            transform: scale(1.01);
        }

        .links {
            display: flex;
            justify-content: space-between;
            font-size: 0.82rem;
        }

        .links a {
            color: #fca5a5;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .links a:hover {
            color: #fff;
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: #f87171;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.82rem;
            margin-bottom: 16px;
            display: none;
        }

        @media (max-width: 480px) {
            .container {
                padding: 28px 20px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="logo">
            <div class="icon">🛡️</div>
            <h2>Admin Panel</h2>
            <p>Authorized personnel only</p>
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <form id="adminLoginForm">
            <label for="email">Admin Email</label>
            <input type="email" id="email" placeholder="admin@civic.com" required>

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" required>

            <button type="submit" id="loginBtn">Admin Login</button>
        </form>

        <div class="links">
            <a href="login.html">← Customer Login</a>
        </div>
    </div>

    <script src="../script/admin-login.js"></script>

</body>

</html>
