<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Civic Issue Reporter</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 18px;
            padding: 36px 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        }

        .logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo .icon {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }

        .logo h2 {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo p {
            color: #64748b;
            font-size: 0.85rem;
            margin-top: 4px;
        }

        label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            padding: 12px 14px;
            color: #0f172a;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            margin-bottom: 18px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input::placeholder {
            color: #94a3b8;
        }

        input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            color: #fff;
            padding: 13px;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
            margin-bottom: 16px;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.3);
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        button:active {
            transform: translateY(1px);
        }

        .links {
            display: flex;
            justify-content: space-between;
            font-size: 0.82rem;
        }

        .links a {
            color: #6366f1;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .links a:hover {
            color: #4f46e5;
        }

        .error-msg {
            background: #fee2e2;
            border: 1px solid #fca5a5;
            color: #ef4444;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.82rem;
            margin-bottom: 16px;
            display: none;
        }

        @media (max-width: 480px) {
            .container {
                padding: 28px 20px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="logo">
            <div class="icon">🏙️</div>
            <h2>Civic Issue Reporter</h2>
            <p>Login to report issues</p>
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <form id="loginForm">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="your@email.com" required>

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" required>

            <button type="submit" id="loginBtn">Login</button>
        </form>

        <div class="links">
            <a href="./views/signup.html">New User? Sign Up</a>
            <a href="./views/admin-login.html">Admin Login</a>
        </div>
    </div>

    <script src="./scripts/login.js"></script>

</body>

</html>
